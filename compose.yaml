services:
  apollo-server-dashboard:
    # Pin to a specific version for reproducible deployments:
    # image: ghcr.io/juliomoralesb/apollo-server-dashboard:1.2.3
    image: ghcr.io/juliomoralesb/apollo-server-dashboard:latest
    container_name: apollo-server-dashboard
    ports:
      - "${FRONTEND_PORT:-9902}:80"
    restart: unless-stopped
    depends_on:
      - apollo-server-dashboard-backend
    networks:
      - apollo-server-network

  apollo-server-dashboard-backend:
    # Pin to a specific version for reproducible deployments:
    # image: ghcr.io/juliomoralesb/apollo-server-dashboard-backend:1.2.3
    image: ghcr.io/juliomoralesb/apollo-server-dashboard-backend:latest
    container_name: apollo-server-dashboard-backend
    environment:
      - API_KEY=${API_KEY:-}
      - FREE_GAMES_NOTIFIER_URL=${FREE_GAMES_NOTIFIER_URL:-http://free-games-notifier:8000}
      - FREE_GAMES_NOTIFIER_API_KEY=${FREE_GAMES_NOTIFIER_API_KEY:-}
      - FREE_GAMES_NOTIFIER_TEST_WEBHOOK_URL=${FREE_GAMES_NOTIFIER_TEST_WEBHOOK_URL:-}
      - SERVICES_CONFIG=${SERVICES_CONFIG:-/app/config/services.yaml}
    volumes:
      - ./config:/app/config
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped
    networks:
      - apollo-server-network

networks:
  apollo-server-network:
    external: true
